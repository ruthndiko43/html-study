<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Application Form</h1>
    <form action="">
        <label for="">First Name:</label>
        <input type="text">
        <label for="">Last Name:</label>
        <input type="text"><br>
        <br>
        <label for="">Date of birth:</label>
        <input type="date">
        <label for="">Age:</label>
        <input type="number"><br>
        <br>
        <label for="">Gender:</label>
        <select name="gender">
        <option value="Female">Female</option>
        <option value="Male">Male</option>
        </select>
        <label for="">Email Address:</label>
        <input type="text" placeholder="Enter email address"><br>
        <br>
        <label for="">Positions Available:</label>
        <input type="radio" name="position" value="Junior Developer">
        <label for="">Junior Developer</label>
        <input type="radio" name="position" value="Mid-level Developer">
        <label for="">Mid-level Developer</label>
        <input type="radio" name="position" value="Senior Developer">
        <label for="">Senior Developer</label><br>
        <br>
        <label for="">Programmming Languages:</label>
        <input type="checkbox" value="Java" name="languages">
        <label for="">Java</label>
        <input type="checkbox" value="JavaScript" name="languages">
        <label for="">JavaScript</label>
        <input type="checkbox" value="Python" name="languages">
        <label for="">Python</label><br>
        <br>
        <label for="">Password</label>
        <input type="password">
        <label for="">Confirm Password:</label>
        <input type="password"><br>
        <br>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
</body>
</html>
